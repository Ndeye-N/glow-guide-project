<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GlowGuide | My Skincare Shelf</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>✨ GlowGuide Shelf</h1>
        <p>Keep track of your Korean skincare favorites.</p>

        <form id="productForm">
            <input type="text" id="name" placeholder="Product Name (e.g. Milk Toner)" required>
            <input type="text" id="brand" placeholder="Brand (e.g. TIRTIR)" required>
            <input type="text" id="type" placeholder="Type (e.g. Toner, Serum)" required>
            <button type="submit">Add to Shelf</button>
        </form>

        <div id="shelfContainer">
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
