<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GlowGuide | My Skincare Shelf</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div style="text-align: right;">
            <button id="logoutBtn" style="background: #ccc; padding: 5px 10px; font-size: 0.7rem; border-radius: 5px; border: none; cursor: pointer;">Logout</button>
        </div>

        <div id="quote-box" class="aesthetic-quote">Loading your daily glow...</div>

        <h1>✨ GlowGuide Shelf</h1>
        <p>Keep track of your Korean skincare favorites.</p>

        <form id="productForm">
            <input type="text" id="name" placeholder="Product Name (e.g. Milk Toner)" required>
            <input type="text" id="brand" placeholder="Brand (e.g. TIRTIR)" required>
            <input type="text" id="type" placeholder="Type (e.g. Toner, Serum)" required>
            <button type="submit">Add to Shelf</button>
        </form>

        <div id="shelfContainer">
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
